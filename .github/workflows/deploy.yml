name: Deploy AANDILIK to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout l-code
      uses: actions/checkout@v4

    - name: Deploy Full-Stack App via SSH Safely
      uses: appleboy/ssh-action@master
      with:
        host: 72.61.198.43
        username: root
        password: ${{ secrets.VPS_PASSWORD }}
        script: |
          cd /var/www/aandilik
          
          # Jib l-koud l-jdid automatique mn GitHub bla structural damage
          git reset --hard HEAD
          git pull origin main

          # ----------------------------------------
          # DEPLOY BACKEND (NestJS)
          # ----------------------------------------
          cd /var/www/aandilik/backend
          npm install
          
          # SAFETY RULE: NEVER OVERWRITE THE PRODUCTION .ENV FILE
          # If .env doesn't exist, create it once. If it exists, we DO NOT touch it.
          if [ ! -f .env ]; then
            echo "PORT=3042" > .env
            echo "DB_HOST=localhost" >> .env
            echo "DB_PORT=3306" >> .env
            echo "DB_USERNAME=root" >> .env
            echo "DB_PASSWORD=NewStrongPassword123!" >> .env
            echo "DB_DATABASE=aandilik" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          fi

          # Run structural schema build safely (WITHOUT automatic re-seeding triggers)
          npm run build
          
          # Restart safely with PM2 preserving current system environment updates
          pm2 restart aandilik-backend --update-env || pm2 start dist/main.js --name "aandilik-backend" --cwd "/var/www/aandilik/backend" -- env PORT=3042

          # ----------------------------------------
          # DEPLOY FRONTEND (Next.js)
          # ----------------------------------------
          cd /var/www/aandilik/frontend
          npm install

          # FORCE HTTPS CRUCIAL RULE FOR PRODUCTION - No more Mixed Content blocks!
          if [ ! -f .env ]; then
            echo "NEXT_PUBLIC_API_URL=https://api.aandilik.com" > .env
            echo "PORT=3041" >> .env
          else
            # Ensure the URL is locked on HTTPS to preserve structural API bindings
            sed -i 's|http://api.aandilik.com|https://api.aandilik.com|g' .env
          fi

          npm run build
          
          # Hot reload for Next.js app layout safely
          pm2 restart aandilik-frontend --update-env || pm2 start npm --name "aandilik-frontend" --cwd "/var/www/aandilik/frontend" -- run start -- -p 3041

          pm2 save