name: Deploy AANDILIK to VPS

on:
  push:
    branches: [ main ] # Kiy-trigga automatique mlli katsift l l-branch main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout l-code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Deploy Full-Stack App via SSH
      uses: appleboy/ssh-action@master
      with:
        host: 72.61.198.43
        username: root
        password: ${{ secrets.VPS_PASSWORD }} # Gha-n-creewha f GitHub Secrets db
        script: |
          # 1. Naviguer l l-dossier principal dyal l-projet
          mkdir -p /var/www/aandilik
          cd /var/www/aandilik

          # [Note: Hna tqder t-dir git pull mlli t-lyé l-repo]
          
          # ----------------------------------------
          # 2. DEPLOY BACKEND (NestJS)
          # ----------------------------------------
          cd /var/www/aandilik/backend
          npm install
          
          # Crée l-fichier .env dyal l-production automatique b l-port 3042
          echo "PORT=3042" > .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=3006" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=NewStrongPassword123!" >> .env
          echo "DB_DATABASE=aandilik" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env

          npm run build
          # Lonsi f PM2 b l-port l-jdid
          pm2 delete aandilik-backend || true
          pm2 start dist/main.js --name "aandilik-backend" -- env PORT=3042

          # ----------------------------------------
          # 3. DEPLOY FRONTEND (Next.js)
          # ----------------------------------------
          cd /var/www/aandilik/frontend
          npm install

          # Crée l-fichier .env dyal l-frontend b l-port jdid o connection m3a backend
          echo "NEXT_PUBLIC_API_URL=http://api.aandilik.com" > .env
          echo "PORT=3041" >> .env

          npm run build
          # Lonsi f PM2 f l-port 3041
          pm2 delete aandilik-frontend || true
          pm2 start npm --name "aandilik-frontend" -- run start -- -p 3041

          # Save PM2 state
          pm2 save