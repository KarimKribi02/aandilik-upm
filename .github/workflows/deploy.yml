name: Deploy AANDILIK to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout l-code
      uses: actions/checkout@v4

    - name: Deploy Full-Stack App via SSH
      uses: appleboy/ssh-action@master
      with:
        host: 72.61.198.43
        username: root
        password: ${{ secrets.VPS_PASSWORD }}
        script: |
          cd /var/www/aandilik
          
          # Jib l-koud l-jdid automatique mn GitHub
          git reset --hard HEAD
          git pull origin main

          # ----------------------------------------
          # DEPLOY BACKEND (NestJS)
          # ----------------------------------------
          cd /var/www/aandilik/backend
          npm install
          
          echo "PORT=3042" > .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=NewStrongPassword123!" >> .env
          echo "DB_DATABASE=aandilik" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env

          npm run build
          pm2 delete aandilik-backend || true
          pm2 start dist/main.js --name "aandilik-backend" --cwd "/var/www/aandilik/backend" -- env PORT=3042

          # ----------------------------------------
          # DEPLOY FRONTEND (Next.js)
          # ----------------------------------------
          cd /var/www/aandilik/frontend
          npm install

          echo "NEXT_PUBLIC_API_URL=http://api.aandilik.com" > .env
          echo "PORT=3041" >> .env

          npm run build
          pm2 delete aandilik-frontend || true
          pm2 start npm --name "aandilik-frontend" --cwd "/var/www/aandilik/frontend" -- run start -- -p 3041

          pm2 save